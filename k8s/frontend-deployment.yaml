apiVersion: apps/v1
kind: Deployment
metadata:
  name: qa-metrics-frontend
  namespace: qa-metrics
  labels:
    app: qa-metrics-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: qa-metrics-frontend
  template:
    metadata:
      labels:
        app: qa-metrics-frontend
    spec:
      containers:
        - name: frontend
          image: qa-metrics-frontend:latest
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 10
