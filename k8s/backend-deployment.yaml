apiVersion: apps/v1
kind: Deployment
metadata:
  name: qa-metrics-backend
  namespace: qa-metrics
  labels:
    app: qa-metrics-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: qa-metrics-backend
  template:
    metadata:
      labels:
        app: qa-metrics-backend
    spec:
      containers:
        - name: backend
          image: qa-metrics-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: qa-metrics-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
